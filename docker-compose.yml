version: '3.8'

services:
  dr-lab-v2:
    image: dr-lab-final:v1
    container_name: dr-lab-v2
    # CRITICAL: Enables the high-speed bridge between C++ and Python
    ipc: host  
    privileged: true
    volumes:
      - .:/app
    ports:
      - "8888:8888" # Keeping Jupyter port access
      - "6006:6006" # Adding TensorBoard for RL monitoring
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Default command starts Jupyter, but keeps the terminal open for your ns-3 runs
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --NotebookApp.password=''
      --notebook-dir=/app
    working_dir: /app
